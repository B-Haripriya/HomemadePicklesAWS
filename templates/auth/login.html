{% extends "base.html" %}
{% block title %}Login – HomeMade Pickles & Snacks{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-icon">🥒</div>
        <h1 class="auth-title">Welcome Back!</h1>
        <p class="auth-sub">Sign in to continue shopping</p>

        <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form" id="loginForm" novalidate>
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-icon-wrap">
                    <i class="fa fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                        required autocomplete="email" />
                </div>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-icon-wrap">
                    <i class="fa fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                        required autocomplete="current-password" />
                    <button type="button" class="toggle-pw" onclick="togglePw('password')"><i class="fa fa-eye"
                            id="pwEye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                <i class="fa fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <p class="auth-switch">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="auth-link">Register here</a>
        </p>

        <div class="demo-credentials">
            <p><strong>Demo Admin:</strong> admin@pickles.com / Admin@1234</p>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    function togglePw(id) {
        const inp = document.getElementById(id);
        const eye = document.getElementById('pwEye');
        if (inp.type === 'password') { inp.type = 'text'; eye.className = 'fa fa-eye-slash'; }
        else { inp.type = 'password'; eye.className = 'fa fa-eye'; }
    }
</script>
{% endblock %}
